document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    --red: #D93025;\n    --peach: #FBE2D3;\n    --peach-edge: #E7A582;\n  }\n\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; background: #FFFFFF; }\n  body {\n    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n    color: var(--ink);\n    -webkit-font-smoothing: antialiased;\n    line-height: 1.4;\n  }\n\n  .wrap {\n    max-width: 820px;\n    margin: 0 auto;\n    padding: 22px 22px 28px 22px;\n  }\n\n  /* ── Header ─────────────────────────────────────────────────────────── */\n  .header {\n    text-align: left;\n    margin-bottom: 16px;\n  }\n  .kicker {\n    display: inline-block;\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--blue);\n    margin-bottom: 6px;\n  }\n  h1 {\n    font-family: 'Source Serif 4', Georgia, serif;\n    font-weight: 700;\n    font-size: 28px;\n    line-height: 1.15;\n    color: var(--navy);\n    margin: 0 0 8px 0;\n    letter-spacing: -0.005em;\n  }\n  .sub {\n    font-size: 14px;\n    color: var(--muted);\n    margin: 0;\n    line-height: 1.45;\n    max-width: 680px;\n  }\n\n  /* ── Scenario ribbon (mirrors printed deck) ─────────────────────────── */\n  .ribbon {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 6px 14px 6px 10px;\n    background: var(--card);\n    border-left: 4px solid var(--red);\n    border-radius: 3px;\n    font-size: 12px;\n    font-weight: 700;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: var(--red);\n    margin: 18px 0 12px 0;\n    transition: all .35s ease;\n  }\n  .ribbon .dot {\n    width: 7px; height: 7px; border-radius: 50%;\n    background: currentColor;\n  }\n  .ribbon[data-pos=\"1\"] {\n    border-left-color: var(--orange);\n    color: var(--orange-ink);\n  }\n  .ribbon[data-pos=\"2\"] {\n    border-left-color: var(--green);\n    color: var(--green-ink);\n  }\n\n  /* ── Channels stage ─────────────────────────────────────────────────── */\n  .stage {\n    position: relative;\n    background: radial-gradient(ellipse at 50% 45%, #FAFCFE 0%, #F4F7FA 100%);\n    border: 1px solid var(--card-edge);\n    border-radius: 14px;\n    padding: 18px 18px 54px 18px;\n    min-height: 330px;\n    overflow: hidden;\n  }\n  .stage-head {\n    display: flex;\n    justify-content: space-between;\n    align-items: baseline;\n    padding-bottom: 10px;\n    border-bottom: 1px solid var(--card-edge);\n    margin-bottom: 10px;\n    gap: 10px;\n    flex-wrap: wrap;\n  }\n  .stage-title {\n    font-size: 13.5px;\n    font-weight: 700;\n    color: var(--navy);\n    white-space: nowrap;\n  }\n  .stage-sub {\n    font-size: 11px;\n    color: var(--muted);\n    font-family: 'JetBrains Mono', ui-monospace, monospace;\n  }\n\n  .bubbles {\n    position: relative;\n    min-height: 240px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-wrap: wrap;\n    gap: 10px 8px;\n    padding: 10px 0 6px;\n  }\n  .b {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: flex-end;\n    opacity: 0;\n    transform: scale(0.4);\n    transition:\n      opacity .5s cubic-bezier(.2,.8,.2,1),\n      transform .5s cubic-bezier(.2,.8,.2,1),\n      width .5s cubic-bezier(.2,.8,.2,1);\n    pointer-events: none;\n    width: 0;\n    min-width: 0;\n  }\n  .b:not([data-visible]) { overflow: hidden; }\n  .b[data-visible] { min-width: 86px; overflow: visible; }\n  .b[data-visible=\"1\"] {\n    opacity: 1;\n    transform: scale(1);\n    pointer-events: auto;\n  }\n  .b .disc {\n    border-radius: 50%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    background: var(--card);\n    border: 2px solid var(--card-edge);\n    color: var(--ink);\n    box-shadow: 0 8px 18px -12px rgba(20, 40, 70, 0.35);\n    transition: width .5s cubic-bezier(.2,.8,.2,1), height .5s cubic-bezier(.2,.8,.2,1);\n    font-family: 'Source Serif 4', serif;\n    font-weight: 700;\n    letter-spacing: -0.02em;\n    line-height: 1;\n  }\n  .b .name {\n    margin-top: 6px;\n    font-size: 11px;\n    font-weight: 600;\n    color: var(--ink);\n    text-align: center;\n    line-height: 1.15;\n    max-width: 140px;\n    min-height: 26px;\n  }\n  .b .badge {\n    margin-top: 8px;\n    font-size: 10px;\n    font-weight: 700;\n    color: var(--navy);\n    background: #FFFFFF;\n    border: 1px solid var(--card-edge);\n    padding: 2px 8px;\n    border-radius: 999px;\n    font-family: 'JetBrains Mono', monospace;\n    letter-spacing: 0.01em;\n    white-space: nowrap;\n  }\n  .b .logo {\n    display: inline-block;\n    margin-bottom: 4px;\n    opacity: 0.95;\n    width: var(--logo-size, 20px);\n    height: var(--logo-size, 20px);\n  }\n  .logo-slot { display: inline-flex; align-items: center; justify-content: center; }\n  .logo-slot:empty { display: none; }\n  .logo-slot .logo { width: var(--logo-size, 20px); height: var(--logo-size, 20px); }\n  .b .share-wrap {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 2px;\n  }\n\n  /* Ecosystem note banner */\n  .eco-note {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    background: #FFFFFF;\n    border: 1px solid var(--card-edge);\n    border-left: 3px solid var(--blue);\n    border-radius: 6px;\n    padding: 6px 10px;\n    font-size: 11.5px;\n    color: var(--ink);\n    margin-bottom: 10px;\n    line-height: 1.3;\n  }\n  .eco-ico {\n    color: var(--blue);\n    font-weight: 700;\n    font-size: 13px;\n    line-height: 1;\n  }\n\n  /* \"Illustrative\" tag in stage-sub */\n  .stage-sub .illu {\n    display: inline-block;\n    background: var(--card);\n    color: var(--muted);\n    font-family: inherit;\n    font-weight: 600;\n    padding: 2px 8px;\n    border-radius: 999px;\n    font-size: 10px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    margin-left: 6px;\n  }\n\n  /* Channel colors */\n  .b.apple   .disc { background:#F4E9E7; border-color:#D9B7B0; color:#6B2014; }\n  .b.google  .disc { background:#E5EEF7; border-color:#A9C4DE; color:#163F6C; }\n  .b.incumbent .disc { background:#E8EDF2; border-color:#8EA2B5; color:#0B2C4A; }\n  .b.epic    .disc { background:#2E2B4E; border-color:#4A4674; color:#F1EFFB; }\n  .b.msft    .disc { background:#E6F1E8; border-color:#9DBEA2; color:#1F4F28; }\n  .b.steam   .disc { background:#1B2838; border-color:#3A5A7A; color:#E7EEF5; }\n  .b.web     .disc { background:#FFF6DE; border-color:#E8C96B; color:#6B4A00; }\n  .b.superapp .disc{ background:#EDE4F7; border-color:#BAA2DE; color:#3E1B72; }\n\n  .scale-note {\n    position: absolute;\n    left: 18px; right: 18px; bottom: 14px;\n    display: flex;\n    justify-content: space-between;\n    font-size: 10.5px;\n    color: var(--muted);\n    font-family: 'JetBrains Mono', monospace;\n  }\n\n  /* ── Metric strip ───────────────────────────────────────────────────── */\n  .metrics {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 10px;\n    margin-top: 14px;\n  }\n  .m {\n    background: var(--card);\n    border-radius: 10px;\n    padding: 12px 14px;\n    border-left: 5px solid var(--rule);\n    transition: border-color .35s ease;\n  }\n  .m.active { border-left-color: var(--accent, var(--navy)); }\n  .m .lab {\n    font-size: 10px;\n    font-weight: 700;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 4px;\n  }\n  .m .val {\n    font-family: 'Source Serif 4', serif;\n    font-weight: 700;\n    font-size: 34px;\n    color: var(--navy);\n    line-height: 1;\n    letter-spacing: -0.02em;\n  }\n  .m.active.orange .val { color: var(--orange-ink); }\n  .m.active.green  .val { color: var(--green-ink); }\n  .m.active.red    .val { color: var(--red); }\n  .m .val .unit {\n    font-family: 'Source Sans 3', sans-serif;\n    font-size: 14px;\n    color: var(--muted);\n    font-weight: 500;\n    margin-left: 4px;\n  }\n  .m .note {\n    margin-top: 4px;\n    font-size: 11.5px;\n    color: var(--muted);\n    line-height: 1.3;\n  }\n\n  /* ── Slider ─────────────────────────────────────────────────────────── */\n  .slider-wrap {\n    margin: 20px 0 8px 0;\n    padding: 16px 18px 14px 18px;\n    background: #FFFFFF;\n    border: 1px solid var(--card-edge);\n    border-radius: 12px;\n  }\n  .slider-title {\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 12px;\n  }\n  .slider {\n    position: relative;\n    height: 68px;\n  }\n  .track {\n    position: absolute;\n    top: 16px; left: 14px; right: 14px;\n    height: 4px;\n    background: var(--rule);\n    border-radius: 2px;\n  }\n  .track-fill {\n    position: absolute;\n    top: 0; left: 0;\n    height: 100%;\n    background: linear-gradient(90deg, var(--red) 0%, var(--orange) 50%, var(--green) 100%);\n    border-radius: 2px;\n    transform-origin: left center;\n    transition: width .35s cubic-bezier(.2,.8,.2,1);\n    width: 0%;\n  }\n  .stops {\n    position: absolute;\n    top: 0; left: 0; right: 0;\n    display: flex;\n    justify-content: space-between;\n    padding: 0 0;\n  }\n  .stop {\n    position: relative;\n    width: 33.33%;\n    padding-top: 6px;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    cursor: pointer;\n    user-select: none;\n    -webkit-tap-highlight-color: transparent;\n  }\n  .stop:first-child { align-items: flex-start; }\n  .stop:last-child  { align-items: flex-end; }\n  .stop .pin {\n    width: 22px;\n    height: 22px;\n    border-radius: 50%;\n    background: #FFFFFF;\n    border: 3px solid var(--rule);\n    transition: border-color .25s ease, transform .25s ease, box-shadow .25s ease;\n    z-index: 2;\n  }\n  .stop[data-active] .pin {\n    transform: scale(1.18);\n    box-shadow: 0 0 0 6px rgba(46, 107, 176, 0.12);\n  }\n  .stop:nth-child(1)[data-active] .pin { border-color: var(--red);    box-shadow: 0 0 0 6px rgba(217,48,37,0.14); }\n  .stop:nth-child(2)[data-active] .pin { border-color: var(--orange); box-shadow: 0 0 0 6px rgba(242,161,42,0.18); }\n  .stop:nth-child(3)[data-active] .pin { border-color: var(--green);  box-shadow: 0 0 0 6px rgba(67,160,71,0.18); }\n  .stop .lab {\n    margin-top: 10px;\n    font-size: 12px;\n    font-weight: 700;\n    color: var(--muted);\n    text-align: center;\n    white-space: nowrap;\n    transition: color .25s ease;\n    letter-spacing: 0.02em;\n  }\n  .stop[data-active] .lab { color: var(--ink); }\n  .stop:nth-child(1)[data-active] .lab { color: var(--red); }\n  .stop:nth-child(2)[data-active] .lab { color: var(--orange-ink); }\n  .stop:nth-child(3)[data-active] .lab { color: var(--green-ink); }\n  .stop .sub {\n    font-size: 10.5px;\n    font-weight: 500;\n    color: var(--muted);\n    text-align: center;\n    margin-top: 2px;\n    font-family: 'JetBrains Mono', monospace;\n    white-space: nowrap;\n  }\n\n  /* Controls row: prev/next arrows for accessibility */\n  .controls {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    margin-top: 20px;\n    gap: 12px;\n    flex-wrap: wrap;\n  }\n  .controls .hint {\n    font-size: 11px;\n    color: var(--muted);\n    font-family: 'JetBrains Mono', monospace;\n    text-align: center;\n    flex: 1;\n    min-width: 120px;\n  }\n  .ctrl {\n    appearance: none;\n    background: #FFFFFF;\n    border: 1px solid var(--card-edge);\n    border-radius: 8px;\n    padding: 6px 12px;\n    font-size: 12px;\n    font-weight: 600;\n    color: var(--ink);\n    cursor: pointer;\n    font-family: inherit;\n  }\n  .ctrl:hover { background: var(--card); }\n  .ctrl[disabled] { opacity: 0.35; cursor: default; }\n  .controls .hint {\n    display: none;\n  }\n\n  /* ── Narrative under the chart ──────────────────────────────────────── */\n  .narrative {\n    margin-top: 16px;\n    padding: 14px 16px;\n    background: #FFFFFF;\n    border: 1px solid var(--card-edge);\n    border-radius: 10px;\n    font-size: 13.5px;\n    line-height: 1.5;\n    color: var(--ink);\n    min-height: 60px;\n  }\n  .narrative .n { display: none; }\n  .narrative .n.active { display: block; }\n  .narrative strong { color: var(--navy); }\n\n  /* ── Footer attribution ─────────────────────────────────────────────── */\n  .foot {\n    margin-top: 14px;\n    font-size: 11px;\n    color: var(--muted);\n    text-align: center;\n    line-height: 1.5;\n  }\n  .foot a {\n    color: var(--blue);\n    text-decoration: none;\n  }\n  .foot a:hover { text-decoration: underline; }\n\n  /* ── Mobile tuning ──────────────────────────────────────────────────── */\n  @media (max-width: 560px) {\n    .wrap { padding: 16px 14px 22px 14px; }\n    h1 { font-size: 22px; }\n    .sub { font-size: 13px; }\n    .metrics { grid-template-columns: 1fr; }\n    .stop .lab { font-size: 11px; }\n    .stop .sub { font-size: 10px; }\n    .stage { padding-bottom: 48px; }\n    .bubbles { min-height: 220px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"wrap\">\n\n  <div class=\"header\">\n    <h1>Interactive — App Store Competition<\u002Fh1>\n    <p class=\"sub\">\n      Drag the slider. Bubble size = each channel's share of US app downloads.\n      As share spreads across more channels, the weighted commission falls —\n      and consumer savings grow.\n    <\u002Fp>\n  <\u002Fdiv>\n\n  <div id=\"ribbon\" class=\"ribbon\" data-pos=\"0\">\n    <span class=\"dot\"><\u002Fspan>\n    <span id=\"ribbon-text\">Status quo · monopoly<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- Channels stage -->\n  <div class=\"stage\" aria-live=\"polite\">\n    <div class=\"stage-head\">\n      <div class=\"stage-title\">Distribution channels<\u002Fdiv>\n      <div class=\"stage-sub\" id=\"stage-sub\">bubble size = share of US app downloads<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"eco-note\" id=\"eco-note\">\n      <span class=\"eco-ico\" aria-hidden=\"true\">ⓘ<\u002Fspan>\n      <span id=\"eco-note-text\">iPhone &amp; Android ecosystems shown side-by-side<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"bubbles\" id=\"bubbles\">\n      <!-- Bubbles populated by JS.  Fixed channel order; share/visibility change per scenario. -->\n    <\u002Fdiv>\n\n    <div class=\"scale-note\">\n      <span id=\"scale-left\">◆ two stores = all distribution<\u002Fspan>\n      <span id=\"scale-right\">no gatekeeper →<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Metric strip -->\n  <div class=\"metrics\">\n    <div class=\"m\" id=\"m-rate\">\n      <div class=\"lab\">Effective commission<\u002Fdiv>\n      <div class=\"val\"><span id=\"val-rate\">~26<\u002Fspan><span class=\"unit\">%<\u002Fspan><\u002Fdiv>\n      <div class=\"note\" id=\"note-rate\">Share-weighted average across channels<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"m\" id=\"m-savings\">\n      <div class=\"lab\">Annual US savings<\u002Fdiv>\n      <div class=\"val\">$<span id=\"val-savings\">0<\u002Fspan><span class=\"unit\">B / yr<\u002Fspan><\u002Fdiv>\n      <div class=\"note\" id=\"note-savings\">vs. today's monopoly<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"m\" id=\"m-hh\">\n      <div class=\"lab\">Per household<\u002Fdiv>\n      <div class=\"val\">$<span id=\"val-hh\">0<\u002Fspan><span class=\"unit\">/ yr<\u002Fspan><\u002Fdiv>\n      <div class=\"note\">≈ 133M US households<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Slider -->\n  <div class=\"slider-wrap\">\n    <div class=\"slider-title\">Choose a scenario<\u002Fdiv>\n    <div class=\"slider\" id=\"slider\" role=\"slider\" tabindex=\"0\" aria-valuemin=\"0\" aria-valuemax=\"2\" aria-valuenow=\"0\" aria-label=\"App store competition scenario\">\n      <div class=\"track\"><div class=\"track-fill\" id=\"track-fill\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"stops\">\n        <div class=\"stop\" data-pos=\"0\" data-active=\"\">\n          <div class=\"pin\"><\u002Fdiv>\n          <div class=\"lab\">Monopoly<\u002Fdiv>\n          <div class=\"sub\">today<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stop\" data-pos=\"1\">\n          <div class=\"pin\"><\u002Fdiv>\n          <div class=\"lab\">Limited<\u002Fdiv>\n          <div class=\"sub\">a few alts<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stop\" data-pos=\"2\">\n          <div class=\"pin\"><\u002Fdiv>\n          <div class=\"lab\">Intense<\u002Fdiv>\n          <div class=\"sub\">open market<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"controls\">\n      <button class=\"ctrl\" id=\"prev\" type=\"button\" aria-label=\"Previous scenario\">← Prev<\u002Fbutton>\n      <span class=\"hint\">Click a stop, drag, or use ← → keys<\u002Fspan>\n      <button class=\"ctrl\" id=\"next\" type=\"button\" aria-label=\"Next scenario\">Next →<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Narrative -->\n  <div class=\"narrative\">\n    <div class=\"n active\" data-n=\"0\">\n      <strong>Status quo · two monopolies.<\u002Fstrong>\n      Apple controls 100% of iPhone app distribution; Google Play takes roughly 90%\n      of Android via licensing terms. Two separate ecosystems, each with its own\n      gatekeeper. The headline 30% commission clears at an effective <strong>~26%<\u002Fstrong>\n      after program discounts.\n    <\u002Fdiv>\n    <div class=\"n\" data-n=\"1\">\n      <strong>Limited competition.<\u002Fstrong>\n      A few alternative stores (Epic, Microsoft, Steam) enter each platform, and\n      developers can link out of apps to route checkout around the store toll.\n      Apple or Google still dominates its own ecosystem at roughly 70%, but the\n      share-weighted commission falls to <strong>~15%<\u002Fstrong>. <em>Shares shown\n      are illustrative.<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"n\" data-n=\"2\">\n      <strong>Intense competition.<\u002Fstrong>\n      Super-apps emerge and direct web installs become frictionless — both work\n      across iPhone and Android, so distribution is now viewed as a single combined\n      market. Every channel has to compete with ~3% payment processing and\n      commissions collapse to <strong>~3%<\u002Fstrong>. <em>Shares shown are\n      illustrative.<\u002Fem>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"foot\">\n    Figures from Sumit Sharma, <em>US Consumer Benefits of Unlocking App Store Competition<\u002Fem>\n    (April 2026), prepared for the Coalition for App Fairness.\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n(() => {\n  // ── Scenario data ──────────────────────────────────────────────────────\n  // Fixed channel order for stable animation; visibility flips per scenario.\n  const CHANNELS = [\n    { key: 'apple',    name: 'Apple<br/>App Store' },\n    { key: 'google',   name: 'Google<br/>Play Store' },\n    { key: 'incumbent',name: 'Incumbent store<br/>(Apple or Google)' },\n    { key: 'epic',     name: 'Epic<br/>Games' },\n    { key: 'msft',     name: 'Microsoft<br/>Store' },\n    { key: 'steam',    name: 'Steam<br/>Mobile' },\n    { key: 'web',      name: 'Direct<br/>web install' },\n    { key: 'superapp', name: 'Super-apps' },\n  ];\n\n  // Per scenario: share % and visibility. Base bubble diameter = √(share) * k\n  const SCENARIOS = {\n    0: { // Monopoly\n      label: 'Status quo · two monopolies',\n      rate: 26, savings: 0, hh: 0,\n      scaleLeft: '◆ iPhone & Android ecosystems shown separately',\n      scaleRight: 'no alternatives',\n      shares: { apple: 100, google: 90, incumbent: 0, epic: 0, msft: 0, steam: 0, web: 0, superapp: 0 },\n      badges: { apple: '100% of iPhone apps', google: '≈90% of Android apps' },\n      accent: 'red',\n      illustrative: false,\n      showLogo: true,\n    },\n    1: { // Limited\n      label: 'Scenario 1 · limited competition',\n      rate: 15, savings: 3.5, hh: 26,\n      scaleLeft: '◆ two dominant stores, but developers can link out',\n      scaleRight: 'a few alternatives →',\n      shares: { apple: 0, google: 0, incumbent: 70, epic: 12, msft: 10, steam: 8, web: 0, superapp: 0 },\n      accent: 'orange',\n      illustrative: true,\n      ecosystemNote: 'Viewed within a single ecosystem — iPhone and Android still separate',\n    },\n    2: { // Intense\n      label: 'Scenario 2 · intense competition',\n      rate: 3, savings: 8.9, hh: 67,\n      scaleLeft: '◆ share spread across iPhone + Android combined',\n      scaleRight: 'no gatekeeper →',\n      shares: { apple: 26, google: 24, incumbent: 0, epic: 12, msft: 10, steam: 8, web: 10, superapp: 10 },\n      accent: 'green',\n      illustrative: true,\n      ecosystemNote: 'Direct web & super-apps work across both Apple and Google ecosystems',\n    },\n  };\n\n  // ── Build bubble nodes once ────────────────────────────────────────────\n  const bubblesEl = document.getElementById('bubbles');\n  const bubbleNodes = {};\n\n  // Apple logo SVG\n  const APPLE_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"24\" viewBox=\"0 0 814 1000\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z\"/><\u002Fsvg>';\n\n  // Google Play logo (triangle with brand gradient)\n  const GOOGLE_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"22\" viewBox=\"0 0 512 512\" aria-hidden=\"true\">' +\n    '<defs>' +\n      '<linearGradient id=\"gp-a\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#00C2FF\"/><stop offset=\"1\" stop-color=\"#00A0F4\"/><\u002FlinearGradient>' +\n      '<linearGradient id=\"gp-b\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\"><stop offset=\"0\" stop-color=\"#FFD600\"/><stop offset=\"1\" stop-color=\"#FF8A00\"/><\u002FlinearGradient>' +\n      '<linearGradient id=\"gp-c\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#FF3A44\"/><stop offset=\"1\" stop-color=\"#C31162\"/><\u002FlinearGradient>' +\n      '<linearGradient id=\"gp-d\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\"><stop offset=\"0\" stop-color=\"#00C853\"/><stop offset=\"1\" stop-color=\"#00E676\"/><\u002FlinearGradient>' +\n    '<\u002Fdefs>' +\n    '<path fill=\"url(#gp-a)\" d=\"M48 32v448l224-224z\"/>' +\n    '<path fill=\"url(#gp-d)\" d=\"M48 32l303 175-79 81z\"/>' +\n    '<path fill=\"url(#gp-c)\" d=\"M48 480l303-175-79-81z\"/>' +\n    '<path fill=\"url(#gp-b)\" d=\"M351 207l113 65c22 12 22 40 0 52l-113 65-79-91z\"/>' +\n    '<\u002Fsvg>';\n\n  // Epic Games — stylised \"E\"\n  const EPIC_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"18\" height=\"22\" viewBox=\"0 0 256 256\" aria-hidden=\"true\">' +\n    '<rect x=\"32\" y=\"24\" width=\"192\" height=\"208\" rx=\"12\" fill=\"currentColor\"/>' +\n    '<path fill=\"#2E2B4E\" d=\"M90 64h82v20h-60v30h52v20h-52v34h62v20H90z\"/>' +\n    '<\u002Fsvg>';\n\n  // Microsoft — four-square\n  const MSFT_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" aria-hidden=\"true\">' +\n    '<rect x=\"1\" y=\"1\" width=\"10\" height=\"10\" fill=\"#F35325\"/>' +\n    '<rect x=\"13\" y=\"1\" width=\"10\" height=\"10\" fill=\"#81BC06\"/>' +\n    '<rect x=\"1\" y=\"13\" width=\"10\" height=\"10\" fill=\"#05A6F0\"/>' +\n    '<rect x=\"13\" y=\"13\" width=\"10\" height=\"10\" fill=\"#FFBA08\"/>' +\n    '<\u002Fsvg>';\n\n  // Steam — stylised pipe/valve mark\n  const STEAM_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"22\" height=\"22\" viewBox=\"0 0 256 256\" aria-hidden=\"true\">' +\n    '<circle cx=\"128\" cy=\"128\" r=\"120\" fill=\"currentColor\"/>' +\n    '<circle cx=\"168\" cy=\"96\" r=\"34\" fill=\"none\" stroke=\"#E7EEF5\" stroke-width=\"12\"/>' +\n    '<circle cx=\"168\" cy=\"96\" r=\"14\" fill=\"#E7EEF5\"/>' +\n    '<circle cx=\"92\" cy=\"166\" r=\"22\" fill=\"none\" stroke=\"#E7EEF5\" stroke-width=\"10\"/>' +\n    '<path d=\"M140 112l-52 48\" stroke=\"#E7EEF5\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\"/>' +\n    '<\u002Fsvg>';\n\n  // Web install — globe\n  const WEB_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" aria-hidden=\"true\">' +\n    '<circle cx=\"12\" cy=\"12\" r=\"9\"/>' +\n    '<path d=\"M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18\"/>' +\n    '<\u002Fsvg>';\n\n  // Super-apps — grid of dots\n  const SUPERAPP_LOGO = '<svg class=\"logo\" xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\">' +\n    '<circle cx=\"5\" cy=\"5\" r=\"2.2\"/><circle cx=\"12\" cy=\"5\" r=\"2.2\"/><circle cx=\"19\" cy=\"5\" r=\"2.2\"/>' +\n    '<circle cx=\"5\" cy=\"12\" r=\"2.2\"/><circle cx=\"12\" cy=\"12\" r=\"2.2\"/><circle cx=\"19\" cy=\"12\" r=\"2.2\"/>' +\n    '<circle cx=\"5\" cy=\"19\" r=\"2.2\"/><circle cx=\"12\" cy=\"19\" r=\"2.2\"/><circle cx=\"19\" cy=\"19\" r=\"2.2\"/>' +\n    '<\u002Fsvg>';\n\n  const LOGOS = {\n    apple: APPLE_LOGO,\n    google: GOOGLE_LOGO,\n    epic: EPIC_LOGO,\n    msft: MSFT_LOGO,\n    steam: STEAM_LOGO,\n    web: WEB_LOGO,\n    superapp: SUPERAPP_LOGO,\n  };\n\n  CHANNELS.forEach(ch => {\n    const el = document.createElement('div');\n    el.className = 'b ' + ch.key;\n    el.innerHTML =\n      '<div class=\"disc\"><div class=\"share-wrap\">' +\n        '<span class=\"logo-slot\"><\u002Fspan>' +\n        '<span class=\"share\">0%<\u002Fspan>' +\n      '<\u002Fdiv><\u002Fdiv>' +\n      '<div class=\"name\">' + ch.name + '<\u002Fdiv>' +\n      '<div class=\"badge\" style=\"display:none\"><\u002Fdiv>';\n    bubblesEl.appendChild(el);\n    bubbleNodes[ch.key] = {\n      root: el,\n      disc: el.querySelector('.disc'),\n      share: el.querySelector('.share'),\n      logoSlot: el.querySelector('.logo-slot'),\n      badge: el.querySelector('.badge'),\n    };\n  });\n\n  // ── Size helpers ───────────────────────────────────────────────────────\n  // Map share % to diameter using √ so visual area tracks share linearly.\n  // Also pick a font size that fits inside the disc.\n  const BASE_K = 18;  // diameter factor\n  const MIN_D = 44;   // minimum visible disc\n  const MAX_D = 196;  // cap so a full-market bubble doesn't blow the layout\n  function diameter(share) {\n    if (!share) return 0;\n    const d = Math.round(Math.sqrt(share) * BASE_K);\n    return Math.max(MIN_D, Math.min(MAX_D, d));\n  }\n  function fontSizeFor(d) {\n    // Font size ~ 28% of diameter, clamped.\n    return Math.max(12, Math.min(40, Math.round(d * 0.26)));\n  }\n\n  // ── Render a scenario ──────────────────────────────────────────────────\n  let current = 0;\n  function render(pos) {\n    const s = SCENARIOS[pos];\n    // Bubbles\n    CHANNELS.forEach(ch => {\n      const share = s.shares[ch.key] || 0;\n      const node = bubbleNodes[ch.key];\n      if (share > 0) {\n        const d = diameter(share);\n        node.root.setAttribute('data-visible', '1');\n        node.root.style.width = Math.max(d + 16, 90) + 'px';\n        node.disc.style.width = d + 'px';\n        node.disc.style.height = d + 'px';\n        node.disc.style.fontSize = fontSizeFor(d) + 'px';\n        node.share.textContent = share + '%';\n        // Company logos where available (Apple, Google, Epic, MS, Steam, Web, Super-apps)\n        // Only show logo when disc is comfortably large; otherwise just the share %.\n        const logo = LOGOS[ch.key];\n        if (logo && d >= 44) {\n          node.logoSlot.innerHTML = logo;\n          const ls = Math.max(12, Math.min(28, Math.round(d * 0.2)));\n          node.logoSlot.style.setProperty('--logo-size', ls + 'px');\n        } else {\n          node.logoSlot.innerHTML = '';\n        }\n        // Badge (scenario 0 uses it to label \"100% of iPhone apps\" etc.)\n        const badgeText = s.badges && s.badges[ch.key];\n        if (badgeText) {\n          node.badge.textContent = badgeText;\n          node.badge.style.display = '';\n        } else {\n          node.badge.style.display = 'none';\n        }\n      } else {\n        node.root.removeAttribute('data-visible');\n        node.root.style.width = '0px';\n        node.disc.style.width = '0px';\n        node.disc.style.height = '0px';\n        node.logoSlot.innerHTML = '';\n        node.badge.style.display = 'none';\n      }\n    });\n\n    // Stage subtitle with optional \"illustrative\" tag\n    const stageSub = document.getElementById('stage-sub');\n    stageSub.innerHTML = 'bubble size = share of downloads' +\n      (s.illustrative ? '<span class=\"illu\">illustrative<\u002Fspan>' : '');\n\n    // Ecosystem note (varies per scenario)\n    const ecoText = {\n      0: 'iPhone & Android ecosystems shown separately — each store monopolises its own platform',\n      1: 'Viewed within a single ecosystem — iPhone and Android still separate',\n      2: 'Direct web & super-apps work across both Apple and Google ecosystems',\n    }[pos];\n    document.getElementById('eco-note-text').textContent = ecoText;\n\n    // Ribbon\n    const ribbon = document.getElementById('ribbon');\n    ribbon.setAttribute('data-pos', String(pos));\n    document.getElementById('ribbon-text').textContent = s.label;\n\n    // Metrics — animate number counters briefly\n    animateNumber('val-rate', s.rate, 350, 0, '~');\n    animateNumber('val-savings', s.savings, 500, 1);\n    animateNumber('val-hh', s.hh, 500, 0);\n\n    // Highlight the active metric\n    ['m-rate','m-savings','m-hh'].forEach(id => {\n      const el = document.getElementById(id);\n      el.classList.remove('orange','green','red');\n      el.classList.add('active', s.accent);\n    });\n\n    // Scale note\n    document.getElementById('scale-left').textContent = s.scaleLeft;\n    document.getElementById('scale-right').textContent = s.scaleRight;\n\n    // Slider stops\n    document.querySelectorAll('.stop').forEach(st => {\n      if (+st.dataset.pos === pos) st.setAttribute('data-active', '');\n      else st.removeAttribute('data-active');\n    });\n\n    // Track fill (0%, 50%, 100%)\n    document.getElementById('track-fill').style.width = (pos * 50) + '%';\n\n    // Narrative\n    document.querySelectorAll('.narrative .n').forEach(n => {\n      n.classList.toggle('active', +n.dataset.n === pos);\n    });\n\n    // Slider aria\n    document.getElementById('slider').setAttribute('aria-valuenow', String(pos));\n\n    // Prev/next enabled state\n    document.getElementById('prev').disabled = (pos === 0);\n    document.getElementById('next').disabled = (pos === 2);\n\n    current = pos;\n  }\n\n  // ── Animated counter ───────────────────────────────────────────────────\n  function animateNumber(id, to, dur, decimals, prefix) {\n    const el = document.getElementById(id);\n    const rawFrom = el.textContent.replace(/[^0-9.]/g, '');\n    const from = parseFloat(rawFrom) || 0;\n    const start = performance.now();\n    function tick(now) {\n      const t = Math.min(1, (now - start) / dur);\n      const eased = t < .5 ? 2*t*t : -1 + (4 - 2*t)*t; // easeInOutQuad\n      const v = from + (to - from) * eased;\n      el.textContent = (prefix || '') + (decimals ? v.toFixed(decimals) : Math.round(v));\n      if (t < 1) requestAnimationFrame(tick);\n      else el.textContent = (prefix || '') + (decimals ? to.toFixed(decimals) : Math.round(to));\n    }\n    requestAnimationFrame(tick);\n  }\n\n  // ── Interactions ───────────────────────────────────────────────────────\n  document.querySelectorAll('.stop').forEach(st => {\n    st.addEventListener('click', () => render(+st.dataset.pos));\n  });\n\n  document.getElementById('prev').addEventListener('click', () => {\n    if (current > 0) render(current - 1);\n  });\n  document.getElementById('next').addEventListener('click', () => {\n    if (current < 2) render(current + 1);\n  });\n\n  // Keyboard\n  const slider = document.getElementById('slider');\n  slider.addEventListener('keydown', (e) => {\n    if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {\n      if (current < 2) { render(current + 1); e.preventDefault(); }\n    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {\n      if (current > 0) { render(current - 1); e.preventDefault(); }\n    } else if (e.key === 'Home') { render(0); e.preventDefault(); }\n    else if (e.key === 'End')  { render(2); e.preventDefault(); }\n    else if (e.key === '1')    { render(0); e.preventDefault(); }\n    else if (e.key === '2')    { render(1); e.preventDefault(); }\n    else if (e.key === '3')    { render(2); e.preventDefault(); }\n  });\n\n  // Drag along the track\n  const track = slider.querySelector('.track');\n  let dragging = false;\n  function positionFromEvent(e) {\n    const rect = track.getBoundingClientRect();\n    const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;\n    const pct = Math.max(0, Math.min(1, x / rect.width));\n    // Snap to 0, 0.5, 1\n    if (pct < 0.25) return 0;\n    if (pct < 0.75) return 1;\n    return 2;\n  }\n  function onDown(e) {\n    dragging = true;\n    const p = positionFromEvent(e);\n    if (p !== current) render(p);\n    e.preventDefault();\n  }\n  function onMove(e) {\n    if (!dragging) return;\n    const p = positionFromEvent(e);\n    if (p !== current) render(p);\n  }\n  function onUp() { dragging = false; }\n  slider.addEventListener('mousedown', onDown);\n  window.addEventListener('mousemove', onMove);\n  window.addEventListener('mouseup', onUp);\n  slider.addEventListener('touchstart', onDown, { passive: false });\n  window.addEventListener('touchmove', onMove, { passive: true });\n  window.addEventListener('touchend', onUp);\n\n  // Initial render\n  render(0);\n\n  // Auto-resize notification for iframe hosts (Substack embeds behave nicer\n  // with explicit height posts)\n  function postHeight() {\n    try {\n      const h = document.body.scrollHeight;\n      window.parent && window.parent.postMessage({ type: 'resize', height: h }, '*');\n    } catch (e) {}\n  }\n  window.addEventListener('load', postHeight);\n  window.addEventListener('resize', postHeight);\n  // Also post after transitions settle\n  setTimeout(postHeight, 600);\n})();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
